<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}Admin - BusBook TN{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">🚌 BusBook <span>Admin</span></div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint=='admin_dashboard' %}active{% endif %}">
        📊 Dashboard
      </a>
      <a href="{{ url_for('admin_buses') }}" class="{% if request.endpoint=='admin_buses' %}active{% endif %}">
        🚌 Manage Buses
      </a>
      <a href="{{ url_for('admin_bookings') }}" class="{% if request.endpoint=='admin_bookings' %}active{% endif %}">
        🎟 All Bookings
      </a>
      <a href="{{ url_for('admin_users') }}" class="{% if request.endpoint=='admin_users' %}active{% endif %}">
        👥 Users
      </a>
      <a href="{{ url_for('index') }}">🌐 View Site</a>
      <a href="{{ url_for('logout') }}" class="logout-link">🚪 Logout</a>
    </nav>
  </aside>
  <main class="admin-main">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{cat}}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
