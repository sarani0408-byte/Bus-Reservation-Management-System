{% extends "base.html" %}
{% block title %}Login - BusBook TN{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <span class="auth-icon">🚌</span>
      <h2>Welcome Back!</h2>
      <p>Login to your BusBook account</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-primary full-width">Login →</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    <p class="demo-hint">Demo Admin: admin@busbook.com / admin123</p>
  </div>
</div>
{% endblock %}
