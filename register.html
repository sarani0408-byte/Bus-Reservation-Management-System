{% extends "base.html" %}
{% block title %}Register - BusBook TN{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <span class="auth-icon">🎟</span>
      <h2>Create Account</h2>
      <p>Join BusBook TN today</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn-primary full-width">Create Account →</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
